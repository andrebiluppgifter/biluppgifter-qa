<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Biluppgifter — Hitta rätt data för ditt behov</title>
<style>
  :root {
    --bg: #fafbfc;
    --panel: #ffffff;
    --border: #e3e8ef;
    --text: #1a2233;
    --muted: #6b7689;
    --accent: #2563eb;
    --accent-2: #1d4ed8;
    --user: #eff4ff;
    --bot: #ffffff;
    --code-bg: #f4f6fa;
    --ok: #16a34a;
    --danger: #dc2626;
    --radius: 14px;
    --shadow: 0 4px 20px rgba(15, 23, 42, 0.08);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 600;
    font-size: 15px;
  }
  .brand .logo {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 14px;
  }
  .brand small { color: var(--muted); font-weight: 400; font-size: 12px; display: block; }
  header .actions { display: flex; gap: 12px; align-items: center; font-size: 13px; color: var(--muted); }
  header .actions a { color: var(--muted); text-decoration: none; }
  header .actions a:hover { color: var(--accent); }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px 140px;
    scroll-behavior: smooth;
  }
  .chat {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    display: flex;
    gap: 12px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 12px;
  }
  .msg.user .avatar { background: var(--user); color: var(--accent); }
  .msg.bot .avatar { background: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%); color: white; }
  .msg .bubble {
    flex: 1;
    background: var(--bot);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    line-height: 1.6;
    font-size: 15px;
  }
  .msg.user .bubble { background: var(--user); border-color: #d4e0fc; }
  .bubble p { margin: 0 0 10px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble h3, .bubble h4 { margin: 14px 0 8px; line-height: 1.3; font-size: 15px; }
  .bubble ul, .bubble ol { padding-left: 22px; margin: 6px 0 10px; }
  .bubble li { margin-bottom: 4px; }
  .bubble code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "SF Mono", Monaco, Consolas, monospace;
    font-size: 13px;
    color: #4a5568;
  }
  .bubble strong { font-weight: 600; }
  .bubble a { color: var(--accent); }

  .typing {
    display: inline-flex;
    gap: 4px;
    padding: 4px 0;
  }
  .typing span {
    width: 7px;
    height: 7px;
    background: #cbd5e0;
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
    30% { opacity: 1; transform: scale(1); }
  }

  .lead-card {
    background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%);
    color: white;
    border-radius: var(--radius);
    padding: 16px 20px;
    margin: 12px 0;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 14px;
    line-height: 1.5;
    box-shadow: 0 2px 8px rgba(22, 163, 74, 0.2);
  }
  .lead-card.error {
    background: linear-gradient(135deg, #dc2626 0%, #f87171 100%);
    box-shadow: 0 2px 8px rgba(220, 38, 38, 0.2);
  }
  .lead-card svg { flex-shrink: 0; }
  .lead-card strong { display: block; margin-bottom: 4px; font-weight: 600; }

  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 20px 20px;
    background: linear-gradient(180deg, transparent 0%, rgba(250, 251, 252, 0.95) 30%, var(--bg) 100%);
    pointer-events: none;
  }
  .composer {
    max-width: 720px;
    margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 8px 8px 16px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    box-shadow: var(--shadow);
    pointer-events: auto;
  }
  .composer textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font: inherit;
    font-size: 15px;
    resize: none;
    outline: none;
    padding: 8px 0;
    max-height: 160px;
    min-height: 24px;
    line-height: 1.5;
  }
  .composer textarea::placeholder { color: #94a3b8; }
  .send-btn {
    background: var(--accent);
    color: white;
    border: none;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }
  .send-btn:hover:not(:disabled) { background: var(--accent-2); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    pointer-events: auto;
  }
  .footer-note a { color: var(--muted); text-decoration: underline; }

  @media (max-width: 640px) {
    header { padding: 12px 14px; }
    main { padding: 16px 12px 120px; }
    footer { padding: 12px 12px 14px; }
    .brand small { display: none; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">B</div>
    <div>
      Biluppgifter
      <small>Hitta rätt data för ert behov</small>
    </div>
  </div>
  <div class="actions">
    <a href="https://www.biluppgifter.se" target="_blank">biluppgifter.se</a>
  </div>
</header>

<main id="main">
  <div id="chat" class="chat"></div>
</main>

<footer>
  <form class="composer" id="composer">
    <textarea id="input" rows="1" placeholder="Skriv ditt svar…" autofocus></textarea>
    <button type="submit" class="send-btn" id="sendBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </form>
  <div class="footer-note">
    Vi behandlar dina uppgifter enligt vår <a href="https://www.biluppgifter.se" target="_blank">integritetspolicy</a>. Kontakt: info@biluppgifter.se
  </div>
</footer>

<script>
const state = {
  messages: [],
  leadSent: false,
};

const $ = (id) => document.getElementById(id);
const chatEl = $('chat');
const inputEl = $('input');
const composerEl = $('composer');
const sendBtn = $('sendBtn');
const mainEl = $('main');

function autoresize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

inputEl.addEventListener('input', () => {
  autoresize(inputEl);
  sendBtn.disabled = !inputEl.value.trim();
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    composerEl.requestSubmit();
  }
});

composerEl.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  autoresize(inputEl);
  sendBtn.disabled = true;
  await sendMessage(text);
  inputEl.focus();
});

/* === Markdown (simple, safe) === */
function renderMarkdown(text) {
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) =>
    '<pre><code>' + code + '</code></pre>'
  );
  html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  html = html.replace(/((?:^[-*] .+(?:\n|$))+)/gm, (block) => {
    const items = block.trim().split('\n').map(l => l.replace(/^[-*] /, ''));
    return '<ul>' + items.map(i => '<li>' + i + '</li>').join('') + '</ul>';
  });
  html = html.split(/\n\n+/).map(part => {
    if (/^\s*<(h\d|ul|ol|pre|table)/i.test(part.trim())) return part;
    return '<p>' + part.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  return html;
}

function addMessage(role, content) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  const avatar = role === 'user' ? 'Du' : 'B';
  el.innerHTML = '<div class="avatar">' + avatar + '</div><div class="bubble"></div>';
  const bubble = el.querySelector('.bubble');
  bubble.innerHTML = renderMarkdown(content);
  chatEl.appendChild(el);
  mainEl.scrollTop = mainEl.scrollHeight;
  return bubble;
}

function addLoadingMessage() {
  const el = document.createElement('div');
  el.className = 'msg bot';
  el.innerHTML = '<div class="avatar">B</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chatEl.appendChild(el);
  mainEl.scrollTop = mainEl.scrollHeight;
  return el;
}

function addLeadCard(success, email) {
  const el = document.createElement('div');
  el.className = 'lead-card' + (success ? '' : ' error');
  if (success) {
    el.innerHTML =
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' +
      '<div><strong>Skickat!</strong>Vi har fått dina uppgifter. Du får ditt test-token på <strong>' + (email || 'din email') + '</strong> inom 24h.</div>';
  } else {
    el.innerHTML =
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
      '<div><strong>Något gick fel</strong>Vi kunde inte skicka dina uppgifter automatiskt. Maila istället <strong>info@biluppgifter.se</strong> med din kontakt så hör vi av oss.</div>';
  }
  chatEl.appendChild(el);
  mainEl.scrollTop = mainEl.scrollHeight;
}

/* === Lead-marker parsing === */
const LEAD_START = '[LEAD_READY]';
const LEAD_END = '[/LEAD_READY]';

function extractLead(text) {
  const start = text.indexOf(LEAD_START);
  if (start === -1) return { display: text, lead: null };
  const end = text.indexOf(LEAD_END, start);
  if (end === -1) {
    // Markören är påbörjad men ej avslutad — dölj från start så användaren inte ser den
    return { display: text.slice(0, start).trimEnd(), lead: null, pending: true };
  }
  const jsonStr = text.slice(start + LEAD_START.length, end).trim();
  let parsed = null;
  try { parsed = JSON.parse(jsonStr); } catch {}
  const display = (text.slice(0, start) + text.slice(end + LEAD_END.length)).trim();
  return { display, lead: parsed };
}

async function sendLead(lead) {
  try {
    const res = await fetch('/api/lead', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(lead),
    });
    if (!res.ok) throw new Error('lead endpoint ' + res.status);
    addLeadCard(true, lead.email);
    state.leadSent = true;
  } catch (err) {
    console.error('lead send failed', err);
    addLeadCard(false, lead.email);
  }
}

/* === Chat call === */
async function sendMessage(text, options = {}) {
  if (!options.hideUser) addMessage('user', text);
  state.messages.push({ role: 'user', content: text });

  const loading = addLoadingMessage();
  let bubble = null;
  let fullText = '';

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: state.messages }),
    });

    if (!response.ok) {
      const errorText = await response.text();
      throw new Error('Chat error ' + response.status + ': ' + errorText);
    }

    loading.remove();
    bubble = addMessage('bot', '');

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const obj = JSON.parse(data);
          if (obj.type === 'content_block_delta' && obj.delta?.type === 'text_delta') {
            fullText += obj.delta.text;
            const { display } = extractLead(fullText);
            bubble.innerHTML = renderMarkdown(display);
            mainEl.scrollTop = mainEl.scrollHeight;
          }
        } catch (e) {}
      }
    }

    // Spara hela texten i historiken så modellen ser sin egen markör nästa tur
    state.messages.push({ role: 'assistant', content: fullText });

    // När streamen är klar — kolla efter lead-markör och skicka mail
    const { lead } = extractLead(fullText);
    if (lead && !state.leadSent && lead.email) {
      await sendLead(lead);
    }
  } catch (err) {
    if (loading.parentNode) loading.remove();
    const errMsg = '⚠️ **Något strulade.** ' + (err.message || err) +
      '\n\nOm det fortsätter — maila info@biluppgifter.se direkt.';
    if (bubble) {
      bubble.innerHTML = renderMarkdown(errMsg);
    } else {
      addMessage('bot', errMsg);
    }
  }
}

/* === Boot — kicka igång konversationen så botten öppnar med sin discovery-fråga === */
async function start() {
  // Skickar en dold start-trigger så botten levererar sin öppning. Användaren ser bara botten.
  await sendMessage('Hej', { hideUser: true });
}
start();
</script>
</body>
</html>
