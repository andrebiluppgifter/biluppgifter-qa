<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Biluppgifter — Hitta rätt data för ditt behov</title>
<link rel="icon" href="/plate.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reddit+Sans:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e9eaec;
    --panel: #ffffff;
    --panel-2: #f6f7f9;
    --header-bg: #1a1a1a;
    --border: #e1e3e6;
    --border-light: #eef0f2;
    --text: #1a1a1a;
    --muted: #6b6f76;
    --muted-2: #9a9ea5;
    --accent: #ff8000;
    --accent-2: #e57100;
    --accent-soft: #fff4e5;
    --accent-soft-2: #ffe8cc;
    --user-bg: #fff4e5;
    --bot-bg: #ffffff;
    --code-bg: #f4f6f8;
    --code-text: #c2570e;
    --ok: #16a34a;
    --danger: #dc2626;
    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.05);
    --shadow: 0 2px 12px rgba(15, 23, 42, 0.06);
    --shadow-lg: 0 8px 32px rgba(15, 23, 42, 0.12);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Reddit Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ============ HEADER ============ */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px;
    background: var(--header-bg);
    flex-shrink: 0;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }
  .brand .logo-tile {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .brand .logo-tile svg {
    width: 26px;
    height: 26px;
    fill: #fff;
  }
  .brand-text {
    color: #fff;
    line-height: 1.15;
  }
  .brand-text .wordmark {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.4px;
  }
  .brand-text .sublabel {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    font-weight: 400;
    margin-top: 2px;
  }
  header .actions { display: flex; gap: 12px; align-items: center; }
  header .actions a {
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-weight: 500;
    font-size: 13.5px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    transition: background 0.15s ease;
  }
  header .actions a:hover { background: rgba(255,255,255,0.16); color: #fff; }

  /* ============ MAIN ============ */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px 140px;
    scroll-behavior: smooth;
  }

  .chat {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    display: flex;
    gap: 12px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg .avatar {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 13px;
    overflow: hidden;
  }
  .msg.user .avatar {
    background: var(--accent-soft-2);
    color: var(--accent-2);
  }
  .msg.bot .avatar {
    background: var(--accent);
  }
  .msg.bot .avatar svg {
    width: 20px;
    height: 20px;
    fill: #fff;
  }
  .msg .bubble {
    flex: 1;
    background: var(--bot-bg);
    border: none;
    border-radius: var(--radius-lg);
    padding: 14px 18px;
    line-height: 1.6;
    font-size: 15px;
    box-shadow: var(--shadow-sm);
  }
  .msg.user .bubble {
    background: var(--user-bg);
    color: var(--text);
  }
  .bubble p { margin: 0 0 10px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble h3, .bubble h4 { margin: 14px 0 8px; line-height: 1.3; font-size: 15px; font-weight: 600; }
  .bubble ul, .bubble ol { padding-left: 22px; margin: 6px 0 10px; }
  .bubble li { margin-bottom: 4px; }
  .bubble code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 5px;
    font-family: "SF Mono", Monaco, Consolas, monospace;
    font-size: 13px;
    color: var(--code-text);
  }
  .bubble strong { font-weight: 600; color: var(--text); }
  .bubble a { color: var(--accent); font-weight: 500; text-decoration: none; }
  .bubble a:hover { text-decoration: underline; }

  .typing {
    display: inline-flex;
    gap: 4px;
    padding: 4px 0;
  }
  .typing span {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: typing 1.2s infinite;
    opacity: 0.4;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: scale(0.85); }
    30% { opacity: 1; transform: scale(1); }
  }

  /* ============ LEAD CARD ============ */
  .lead-card {
    background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%);
    color: white;
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    margin: 12px 0;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 14px;
    line-height: 1.5;
    box-shadow: 0 4px 14px rgba(22, 163, 74, 0.25);
  }
  .lead-card.error {
    background: linear-gradient(135deg, #dc2626 0%, #f87171 100%);
    box-shadow: 0 4px 14px rgba(220, 38, 38, 0.25);
  }
  .lead-card svg { flex-shrink: 0; }
  .lead-card strong { display: block; margin-bottom: 4px; font-weight: 600; }

  /* ============ COMPOSER (FOOTER) ============ */
  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 20px 18px;
    background: linear-gradient(180deg, transparent 0%, rgba(233, 234, 236, 0.85) 30%, var(--bg) 100%);
    pointer-events: none;
  }
  .composer {
    max-width: 760px;
    margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 6px 6px 22px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: var(--shadow-lg);
    pointer-events: auto;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .composer:focus-within { border-color: var(--accent); box-shadow: 0 8px 32px rgba(255, 128, 0, 0.18); }
  .composer textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font: inherit;
    font-size: 15px;
    resize: none;
    outline: none;
    padding: 12px 0;
    max-height: 160px;
    min-height: 24px;
    line-height: 1.5;
    font-family: inherit;
  }
  .composer textarea::placeholder { color: var(--muted-2); }
  .send-btn {
    background: var(--accent);
    color: white;
    border: none;
    width: 44px;
    height: 44px;
    border-radius: 999px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
    flex-shrink: 0;
  }
  .send-btn:hover:not(:disabled) { background: var(--accent-2); }
  .send-btn:disabled { background: var(--muted-2); cursor: not-allowed; }
  .send-btn svg { width: 20px; height: 20px; }

  .footer-note {
    text-align: center;
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 10px;
    pointer-events: auto;
  }
  .footer-note a { color: var(--accent); text-decoration: none; }
  .footer-note a:hover { text-decoration: underline; }

  /* ============ MOBILE ============ */
  @media (max-width: 640px) {
    header { padding: 12px 14px; }
    .brand .logo-tile { width: 38px; height: 38px; border-radius: 8px; }
    .brand .logo-tile svg { width: 22px; height: 22px; }
    .brand-text .wordmark { font-size: 18px; }
    .brand-text .sublabel { display: none; }
    header .actions a { padding: 6px 10px; font-size: 12.5px; }
    main { padding: 18px 12px 130px; }
    footer { padding: 12px 12px 14px; }
    .composer { padding: 4px 4px 4px 18px; }
    .composer textarea { padding: 10px 0; }
    .send-btn { width: 40px; height: 40px; }
  }
</style>
</head>
<body>
<header>
  <a href="/" class="brand">
    <div class="logo-tile">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="m73.474 0c-7.4644 0-13.474 6.0093-13.474 13.474v485.05c0 7.4644 6.0093 13.474 13.474 13.474h188.69c81.55 0 155.51-49.421 186.72-124.76 31.208-75.343 13.852-162.59-43.813-220.25l-57.163-57.163c-5.2781-5.2781-13.777-5.2781-19.055 0l-76.218 76.218c-5.2781 5.2781-5.2781 13.777 0 19.055l57.166 57.163c19.404 19.404 25.104 48.063 14.603 73.416-10.501 25.353-34.795 41.589-62.237 41.589 0 0-47.283-0.0164-53.955 0s-13.387-6.5755-13.474-13.474c-0.0866-6.8982 0-350.32 0-350.32 0-7.4644-6.0093-13.474-13.474-13.474z"/></svg>
    </div>
    <div class="brand-text">
      <div class="wordmark">biluppgifter</div>
      <div class="sublabel">Hitta rätt data för ert behov</div>
    </div>
  </a>
  <div class="actions">
    <a href="https://www.biluppgifter.se" target="_blank">biluppgifter.se</a>
  </div>
</header>

<main id="main">
  <div id="chat" class="chat"></div>
</main>

<footer>
  <form class="composer" id="composer">
    <textarea id="input" rows="1" placeholder="Skriv ditt svar…" autofocus></textarea>
    <button type="submit" class="send-btn" id="sendBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </form>
  <div class="footer-note">
    Vi behandlar dina uppgifter enligt vår <a href="https://www.biluppgifter.se" target="_blank">integritetspolicy</a>. Kontakt: sales@biluppgifter.se
  </div>
</footer>

<script>
const state = {
  messages: [],
  leadSent: false,
};

const $ = (id) => document.getElementById(id);
const chatEl = $('chat');
const inputEl = $('input');
const composerEl = $('composer');
const sendBtn = $('sendBtn');
const mainEl = $('main');

const BOT_AVATAR_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="m73.474 0c-7.4644 0-13.474 6.0093-13.474 13.474v485.05c0 7.4644 6.0093 13.474 13.474 13.474h188.69c81.55 0 155.51-49.421 186.72-124.76 31.208-75.343 13.852-162.59-43.813-220.25l-57.163-57.163c-5.2781-5.2781-13.777-5.2781-19.055 0l-76.218 76.218c-5.2781 5.2781-5.2781 13.777 0 19.055l57.166 57.163c19.404 19.404 25.104 48.063 14.603 73.416-10.501 25.353-34.795 41.589-62.237 41.589 0 0-47.283-0.0164-53.955 0s-13.387-6.5755-13.474-13.474c-0.0866-6.8982 0-350.32 0-350.32 0-7.4644-6.0093-13.474-13.474-13.474z"/></svg>';

function autoresize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

inputEl.addEventListener('input', () => {
  autoresize(inputEl);
  sendBtn.disabled = !inputEl.value.trim();
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    composerEl.requestSubmit();
  }
});

composerEl.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  autoresize(inputEl);
  sendBtn.disabled = true;
  await sendMessage(text);
  inputEl.focus();
});

/* === Markdown (simple, safe) === */
function renderMarkdown(text) {
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) =>
    '<pre><code>' + code + '</code></pre>'
  );
  html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  html = html.replace(/((?:^[-*] .+(?:\n|$))+)/gm, (block) => {
    const items = block.trim().split('\n').map(l => l.replace(/^[-*] /, ''));
    return '<ul>' + items.map(i => '<li>' + i + '</li>').join('') + '</ul>';
  });
  html = html.split(/\n\n+/).map(part => {
    if (/^\s*<(h\d|ul|ol|pre|table)/i.test(part.trim())) return part;
    return '<p>' + part.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  return html;
}

function addMessage(role, content) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  const avatar = role === 'user' ? 'Du' : BOT_AVATAR_SVG;
  el.innerHTML = '<div class="avatar">' + avatar + '</div><div class="bubble"></div>';
  const bubble = el.querySelector('.bubble');
  bubble.innerHTML = renderMarkdown(content);
  chatEl.appendChild(el);
  mainEl.scrollTop = mainEl.scrollHeight;
  return bubble;
}

function addLoadingMessage() {
  const el = document.createElement('div');
  el.className = 'msg bot';
  el.innerHTML = '<div class="avatar">' + BOT_AVATAR_SVG + '</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chatEl.appendChild(el);
  mainEl.scrollTop = mainEl.scrollHeight;
  return el;
}

function addLeadCard(success, email) {
  const el = document.createElement('div');
  el.className = 'lead-card' + (success ? '' : ' error');
  if (success) {
    el.innerHTML =
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' +
      '<div><strong>Skickat!</strong>Vi har fått dina uppgifter. Du får ditt test-token på <strong>' + (email || 'din email') + '</strong> inom 24h.</div>';
  } else {
    el.innerHTML =
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
      '<div><strong>Något gick fel</strong>Vi kunde inte skicka dina uppgifter automatiskt. Maila istället <strong>sales@biluppgifter.se</strong> med din kontakt så hör vi av oss.</div>';
  }
  chatEl.appendChild(el);
  mainEl.scrollTop = mainEl.scrollHeight;
}

/* === Lead-marker parsing === */
const LEAD_START = '[LEAD_READY]';
const LEAD_END = '[/LEAD_READY]';

function extractLead(text) {
  const start = text.indexOf(LEAD_START);
  if (start === -1) return { display: text, lead: null };
  const end = text.indexOf(LEAD_END, start);
  if (end === -1) {
    return { display: text.slice(0, start).trimEnd(), lead: null, pending: true };
  }
  const jsonStr = text.slice(start + LEAD_START.length, end).trim();
  let parsed = null;
  try { parsed = JSON.parse(jsonStr); } catch {}
  const display = (text.slice(0, start) + text.slice(end + LEAD_END.length)).trim();
  return { display, lead: parsed };
}

async function sendLead(lead) {
  try {
    const res = await fetch('/api/lead', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(lead),
    });
    if (!res.ok) throw new Error('lead endpoint ' + res.status);
    addLeadCard(true, lead.email);
    state.leadSent = true;
  } catch (err) {
    console.error('lead send failed', err);
    addLeadCard(false, lead.email);
  }
}

/* === Chat call === */
async function sendMessage(text, options = {}) {
  if (!options.hideUser) addMessage('user', text);
  state.messages.push({ role: 'user', content: text });

  const loading = addLoadingMessage();
  let bubble = null;
  let fullText = '';

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: state.messages }),
    });

    if (!response.ok) {
      const errorText = await response.text();
      throw new Error('Chat error ' + response.status + ': ' + errorText);
    }

    loading.remove();
    bubble = addMessage('bot', '');

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const obj = JSON.parse(data);
          if (obj.type === 'content_block_delta' && obj.delta?.type === 'text_delta') {
            fullText += obj.delta.text;
            const { display } = extractLead(fullText);
            bubble.innerHTML = renderMarkdown(display);
            mainEl.scrollTop = mainEl.scrollHeight;
          }
        } catch (e) {}
      }
    }

    state.messages.push({ role: 'assistant', content: fullText });

    const { lead } = extractLead(fullText);
    if (lead && !state.leadSent && lead.email) {
      await sendLead(lead);
    }
  } catch (err) {
    if (loading.parentNode) loading.remove();
    const errMsg = '⚠️ **Något strulade.** ' + (err.message || err) +
      '\n\nOm det fortsätter — maila sales@biluppgifter.se direkt.';
    if (bubble) {
      bubble.innerHTML = renderMarkdown(errMsg);
    } else {
      addMessage('bot', errMsg);
    }
  }
}

/* === Boot — kicka igång konversationen så botten öppnar med sin discovery-fråga === */
async function start() {
  await sendMessage('Hej', { hideUser: true });
}
start();
</script>
</body>
</html>
